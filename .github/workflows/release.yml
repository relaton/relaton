# Releases the single `relaton` gem (every flavor bundled) and `relaton-cli`.
# The gem version is set by editing lib/relaton/version.rb (Relaton::VERSION)
# and relaton-cli's own version file; commit that before running this workflow.
name: release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, do not push to RubyGems)'
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Build relaton + relaton-cli
      run: bundle exec rake build_all

    - name: Setup RubyGems credentials
      if: ${{ !inputs.dry_run }}
      run: |
        mkdir -p ~/.gem
        cat > ~/.gem/credentials << EOF
        ---
        :rubygems_api_key: ${{ secrets.RELATON_CI_RUBYGEMS_API_KEY }}
        EOF
        chmod 0600 ~/.gem/credentials

    - name: Push to RubyGems
      if: ${{ !inputs.dry_run }}
      run: |
        gem push pkg/relaton-*.gem
        gem push gems/relaton-cli/relaton-cli-*.gem

    - name: Summary
      run: |
        echo "relaton  v$(ruby -Ilib -e 'require "relaton/version"; print Relaton::VERSION')"
        find pkg gems/relaton-cli -maxdepth 1 -name "relaton*-*.gem" -exec basename {} \;
