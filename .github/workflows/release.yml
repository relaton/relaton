# Releases all relaton gems to RubyGems in dep-aware order.
name: release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Master version bump (only major or minor change the shared MAJOR.MINOR; skip releases gems at their current versions)'
        required: true
        default: 'skip'
        type: choice
        options:
          - skip
          - minor
          - major
      dry_run:
        description: 'Dry run (do not actually push to RubyGems)'
        required: false
        default: false
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.3'
        bundler-cache: true

    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

    - name: Check version synchronization (shared MAJOR.MINOR)
      run: bundle exec rake version:check

    - name: Bump master version
      if: ${{ inputs.version_type != 'skip' }}
      run: |
        bundle exec rake "version:bump[${{ inputs.version_type }}]"
        echo "NEW_VERSION=$(grep MONOREPO_VERSION lib/relaton/version.rb | head -1 | sed -E 's/.*"([^"]+)".*/\1/')" >> $GITHUB_ENV

    - name: Get current version (skip mode)
      if: ${{ inputs.version_type == 'skip' }}
      run: |
        echo "NEW_VERSION=$(grep MONOREPO_VERSION lib/relaton/version.rb | head -1 | sed -E 's/.*"([^"]+)".*/\1/')" >> $GITHUB_ENV

    - name: Commit version changes
      if: ${{ !inputs.dry_run && inputs.version_type != 'skip' }}
      run: |
        git add -A
        git commit -m "Bump master version to ${{ env.NEW_VERSION }}"
        git tag "v${{ env.NEW_VERSION }}"

    - name: Build all gems
      run: bundle exec rake build:all

    - name: Setup RubyGems credentials
      if: ${{ !inputs.dry_run }}
      run: |
        mkdir -p ~/.gem
        cat > ~/.gem/credentials << EOF
        ---
        :rubygems_api_key: ${{ secrets.RELATON_CI_RUBYGEMS_API_KEY }}
        EOF
        chmod 0600 ~/.gem/credentials

    - name: Validate release order
      run: bundle exec rake release:validate_order

    - name: Release gems to RubyGems in dep-aware order
      if: ${{ !inputs.dry_run }}
      run: |
        GEMS=($(jq -r '.release_order[]' release-order.json))
        for gem in "${GEMS[@]}"; do
          echo "Releasing $gem..."
          cd "gems/$gem"
          gem_file=$(ls *.gem | head -1)
          if [ -f "$gem_file" ]; then
            gem push "$gem_file" || echo "(may already be published)"
            echo "✓ $gem"
          else
            echo "✗ No gem file for $gem"
            exit 1
          fi
          cd ../..
          sleep 5
        done

    - name: Push changes and tags
      if: ${{ !inputs.dry_run && inputs.version_type != 'skip' }}
      run: |
        git push origin main
        git push origin "v${{ env.NEW_VERSION }}"

    - name: Generate release body
      if: ${{ !inputs.dry_run && inputs.version_type != 'skip' }}
      run: |
        echo "## Release v${{ env.NEW_VERSION }}" > release_body.md
        echo "" >> release_body.md
        echo "Monorepo master MAJOR.MINOR bump. Per-gem PATCH versions remain independent." >> release_body.md
        echo "" >> release_body.md
        echo "### Gems released:" >> release_body.md
        jq -r '.release_order[]' release-order.json | while read gem; do
          v=$(ruby -e "puts Gem::Specification.load('gems/$gem/$gem.gemspec').version.to_s")
          echo "- $gem v$v" >> release_body.md
        done

    - name: Create GitHub Release
      if: ${{ !inputs.dry_run && inputs.version_type != 'skip' }}
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: "v${{ env.NEW_VERSION }}"
        release_name: "Release v${{ env.NEW_VERSION }}"
        body_path: release_body.md
        draft: false
        prerelease: false

    - name: Dry run summary
      if: ${{ inputs.dry_run }}
      run: |
        echo "## Dry Run Summary"
        echo "Would have released master version: ${{ env.NEW_VERSION }}"
        find gems -name "*.gem" -exec basename {} \;
