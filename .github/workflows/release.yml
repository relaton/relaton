# Releases the two gems this repo publishes: the combined `relaton` (every
# flavor bundled) and `relaton-cli`. Delegates to the shared relaton/support
# release workflow, same as every relaton gem — but with a custom release
# command so a single job (and a single git tag) publishes both gems.
name: release

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: |
          Next release version: x.y.z / major / minor / patch / pre|rc|etc,
          or 'skip' to push the current versions without a version bump or tag.
        required: true
        default: 'skip'
  repository_dispatch:
    types: [ do-release ]

jobs:
  release:
    uses: relaton/support/.github/workflows/release.yml@main
    with:
      next_version: ${{ github.event.inputs.next_version || 'skip' }}
      # Build + push both gems from the repo root. `rake build_all` builds
      # relaton (root gemspec) and relaton-cli. Non-'skip' bumps + tags the
      # `relaton` version (which every flavor derives from); keep relaton-cli's
      # version file in sync in the same commit.
      release_command: |
        bundle exec rake build_all
        gem push pkg/relaton-*.gem
        gem push gems/relaton-cli/relaton-cli-*.gem
    secrets:
      rubygems-api-key: ${{ secrets.RELATON_CI_RUBYGEMS_API_KEY }}
