        Realize","isbn-type":[{"value":"9786552220158","type":"print"}],"content-domain":{"domain":[],"crossmark-restriction":false},"abstract":"<jats:p>Percebe-se
        que o Programa de Resid\u00eancia Pedag\u00f3gica da CAPES, tem contribu\u00eddo
        de forma significativa e problematizadora na forma\u00e7\u00e3o inicial de
        professores. Em cen\u00e1rios onde o tecnicismo e o modelo de desenvolvimento
        e modernidade euroc\u00eantrico t\u00eam tomado importante espa\u00e7o nas
        discuss\u00f5es da forma\u00e7\u00e3o de professores de Ci\u00eancias e Biologia,
        tendo este programa de forma\u00e7\u00e3o inicial de professores se consolidado
        em um potente espa\u00e7o de cr\u00edtica e constru\u00e7\u00e3o de identidade
        docente. Partindo do pressuposto pedag\u00f3gico Freiriano, que se apoia na
        indissociabilidade entre forma\u00e7\u00e3o docente e a pesquisa, assentada
        numa constru\u00e7\u00e3o de aprendizagens a partir do di\u00e1logo e reflex\u00f5es
        cr\u00edticas, propusemos como quest\u00e3o problematizadora: qual ci\u00eancia
        temos discutido e propomos que os nossos licenciandos\/residentes ensinem?
        Objetivou-se a partir do presente trabalho compreender quais as concep\u00e7\u00f5es
        sobre o conhecimento cient\u00edfico nortearam as reflex\u00f5es e constru\u00e7\u00f5es
        identit\u00e1rias de licenciandos participantes do Programa de Resid\u00eancia
        Pedag\u00f3gica (CAPES \u2013 Edital N\u00b0 24\/2022) do Curso de Ci\u00eancias
        Biol\u00f3gicas da Universidade Estadual Vale do Acara\u00fa (UVA), entre
        estudantes participantes do Programa de Resid\u00eancia Pedag\u00f3gica. Optamos
        pelos pressupostos metodol\u00f3gicos de grupo focal, tendo sido aplicados
        question\u00e1rios, com o pr\u00e9vio estabelecimento do TCLE, por meio da
        ferramenta do Google forms, com quest\u00f5es abertas, elaboradas a partir
        da problematiza\u00e7\u00e3o e objetivos descritos pela investiga\u00e7\u00e3o.
        Utilizou-se a hermen\u00eautica como princ\u00edpio epistemol\u00f3gico para
        a an\u00e1lise doa resultados e interpreta\u00e7\u00e3o dos significados produzidos
        pelo grupo. A const\u00e2ncia dos posicionamentos mencionados pelos participantes
        acerca da forma\u00e7\u00e3o dos estudantes deve se dar a partir repert\u00f3rios
        did\u00e1tico-pedag\u00f3gicos que estejam amparados numa perspectiva cr\u00edtica
        e contextualizada a saberes e referenciais socioculturais dos estudantes,
        nos encaminha a uma compreens\u00e3o de que as percep\u00e7\u00f5es cient\u00edficas
        constru\u00eddas pelos alunos(a)s residentes estejam pautadas em: transforma\u00e7\u00e3o
        social, vis\u00e3o cr\u00edtica e consciente de mundo, conhecer a si e o meio
        que o cerca e a autonomia argumentativa.\n<\/jats:p>","DOI":"10.46943\/x.conedu.2024.gt16.030","type":"book-chapter","created":{"date-parts":[[2024,11,28]],"date-time":"2024-11-28T18:35:46Z","timestamp":1732818946000},"source":"Crossref","is-referenced-by-count":0,"title":["QUE
