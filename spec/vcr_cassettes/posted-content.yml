      encoding: ASCII-8BIT
      string: '{"status":"ok","message-type":"work","message-version":"1.0.0","message":{"institution":[{"name":"bioRxiv"}],"indexed":{"date-parts":[[2026,1,15]],"date-time":"2026-01-15T13:29:27Z","timestamp":1768483767781,"version":"3.49.0"},"posted":{"date-parts":[[2019,8,30]]},"group-title":"Microbiology","reference-count":71,"publisher":"openRxiv","content-domain":{"domain":[],"crossmark-restriction":false},"short-container-title":[],"accepted":{"date-parts":[[2019,8,29]]},"abstract":"<jats:title>ABSTRACT<\/jats:title>\n                <jats:p>\n                  Lsr2-like
        nucleoid-associated proteins play an important role as xenogeneic silencers
        (XS) of horizontally acquired genomic regions in actinobacteria. In this study,
        we systematically analyzed the in vivo constraints underlying silencing and
        counter-silencing of the Lsr2-like protein CgpS in\n                  <jats:italic>Corynebacterium
        glutamicum<\/jats:italic>\n                  . Genome-wide analysis revealed
        binding of CgpS to regions featuring a distinct drop in GC-profile close to
        the transcription start site (TSS), but also identified an overrepresented
        motif with multiple A\/T steps at the nucleation site of the nucleoprotein
        complex. Binding of specific transcription factors (TFs) may oppose XS activity
        leading to counter-silencing. Following a synthetic counter-silencing approach,
        target gene activation was realized by inserting operator sites of an effector-responsive
        TF within various CgpS target promoters resulting in an increased promoter
        activity upon TF binding. Analysis of reporter constructs revealed maximal
        counter-silencing when the TF operator site was inserted at the position of
        maximal CgpS coverage. This principle was implemented in a synthetic toggle
        switch, which features a robust and reversible response to effector availability
        highlighting the potential for biotechnological applications. Altogether,
        our results provide comprehensive insights into how Lsr2 silencing and counter-silencing
        shapes evolutionary network expansion in this medically- and biotechnologically-relevant
        bacterial phylum.\n                <\/jats:p>\n                <jats:sec>\n                  <jats:title>IMPORTANCE<\/jats:title>\n                  <jats:p>\n                    In
        actinobacteria, Lsr2-like nucleoid-associated proteins function as xenogeneic
        silencers (XS) of horizontally acquired genomic regions, including viral elements,
        virulence gene clusters in\n                    <jats:italic>Mycobacterium
        tuberculosis<\/jats:italic>\n                    , and genes involved in cryptic
        specialized metabolism in\n                    <jats:italic>Streptomyces<\/jats:italic>\n                    species.
        Consequently, a detailed mechanistic understanding of Lsr2 binding in vivo
        is relevant as a potential drug target and for the identification novel bioactive
        compounds. Here, we followed an in vivo approach to investigate the rules
        underlying xenogeneic silencing and counter-silencing of the Lsr2-like XS
        CgpS from\n                    <jats:italic>Corynebacterium glutamicum<\/jats:italic>\n                    .
        Our results demonstrated that CgpS distinguishes between self and foreign
        by recognizing a distinct drop in GC-profile in combination with a short,
        sequence specific motif at the nucleation site. Following a synthetic counter-silencer
        approach, we studied the potential and constraints of transcription factors
        to counteract CgpS silencing thereby facilitating the integration of new genetic
        traits into host regulatory networks.\n                  <\/jats:p>\n                <\/jats:sec>","DOI":"10.1101\/751156","type":"posted-content","created":{"date-parts":[[2019,8,30]],"date-time":"2019-08-30T19:35:10Z","timestamp":1567193710000},"source":"Crossref","is-referenced-by-count":0,"title":["Deciphering
