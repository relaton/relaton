        asked, \u201cCan the absolute values and moral laws which most of us suppose
        to have some place in political life\u2014individual freedom, political justice,
        pacta sunt servanda\u2014be established in any way by modern scientific method?
        Is there any bridge across the logical gulf between metaphysics and empirical
        science, between Ought and Is?\u00a0.\u00a0.\u00a0. Is scientific relativism
        necessarily destructive of belief in values? If not, can scientific method
        examine values and say anything about them? Such are the questions Dr Brecht
        discusses, in this wide and tranquil survey of the social sciences and scientific
        method from Kant to the present day.\u00a0.\u00a0.\u00a0. His argument culminates
        in the discovery of factual truth as the first postulate of justice, on the
        ground that it is a universal phenomenon of human thinking and feeling to
        understand justice as at least the correcting of a falsification of facts
        (e.g. the Dreyfus case).\u00a0.\u00a0.\u00a0. \u2018A precious wreath will
        await science if it will wage a candid fight against superstition, against
        factual errors and poor thinking, and especially\u2014against lies\u2019 (p.\u00a0416).\u00a0.\u00a0.\u00a0.
        It displays scientific method not as the spirit of technological barbarism
        gnawing at the values on which Western civilization is built, but as itself
        one of the highest products of these values, because it unites the pursuit
        of knowledge that can be communicated between man and man with the respect
        each man must have for the trans-scientific beliefs of others.\u201d<\/jats:p>","DOI":"10.1093\/oso\/9780198905554.003.0057","type":"book-chapter","created":{"date-parts":[[2025,3,20]],"date-time":"2025-03-20T05:41:53Z","timestamp":1742449313000},"page":"361-362","source":"Crossref","is-referenced-by-count":0,"title":["Review
